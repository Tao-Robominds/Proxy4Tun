# =====================================================================
# SAM4Tun Ontology
# ---------------------------------------------------------------------
# Purpose:
#   A machine-readable description of the SAM4Tun tunnel
#   lining point-cloud segmentation pipeline (as implemented in
#   notebook/t1&2.ipynb, notebook/t3.ipynb, notebook/t4&5.ipynb and
#   described in the SAM4Tun paper, notebook/paper/sam4tun.pdf).
#
#   It is designed to be consumed by STAGED LLM AGENTS: one agent per
#   pipeline stage inspects the current `State` of that stage (its
#   inputs, outputs and quality metrics), classifies it against the
#   `failure_modes` using the `diagnostic_rules`, and proposes concrete
#   `remediation_actions` (parameter changes) that respect the
#   `inter_stage_dependencies`.
#
# Scope note:
#   SAM4Tun is the focus. Seg2Tunnel is NOT modelled as a pipeline; it
#   only supplies per-tunnel PRIOR information (T1-T5), captured in the
#   companion file `tunnel_priors.yaml` and referenced here through the
#   `tunnel_dependent: true` flag on parameters.
#
# The former Algorithm 4 is modelled as two independent stages/algorithms:
#   - stage_4_detection    (Algorithm 4: joint / segment prompt-centre detection)
#   - stage_5_segmentation (Algorithm 5: SAM template-prompt segmentation + reprojection)
# =====================================================================

meta:
  name: SAM4Tun Ontology
  version: 0.1.0
  domain: tunnel lining point-cloud instance/semantic segmentation
  method: no-training, prompt-engineered Segment Anything Model (SAM)
  focus_paper: SAM4Tun (notebook/paper/sam4tun.pdf)
  prior_source: Seg2Tunnel (per-tunnel priors only, see tunnel_priors.yaml)
  source_notebooks:
    - notebook/t1&2.ipynb   # tunnels T1, T2
    - notebook/t3.ipynb     # tunnel  T3
    - notebook/t4&5.ipynb   # tunnels T4, T5
  coordinate_systems:
    cartesian: [x, y, z]                 # raw scanner point cloud
    cylindrical: [h, theta, r]           # h=arc-length along centre line, theta=circumferential, r=radius
    image: [pixel_x, pixel_y]            # unrolled depth map, resolution meters/pixel
  label_semantics:
    pred_value_9: "candidate lining point, not yet segmented"
    pred_value_0: "background / uncovered (rails, tube, outliers, out-of-range r)"
    pred_ring_minus1: "point not assigned to any ring instance"

# ---------------------------------------------------------------------
# ARTIFACTS: the data objects that flow between stages. Edges between
# stages are defined implicitly by produced_by / consumed_by.
# ---------------------------------------------------------------------
artifacts:
  raw_point_cloud:
    description: "Nx6 array (x, y, z, intensity, segment[gt], ring[gt])."
    space: cartesian
    produced_by: external_scan
    consumed_by: [stage_1_centreline]
  direction_vector:
    description: "Tunnel axis endpoints center1, center2 from XOY min bounding rectangle."
    produced_by: stage_1_centreline
    consumed_by: [stage_1_centreline]
  slice_cloud:
    description: "Per-plane point-cloud slices perpendicular to the axis; count = ring_count."
    produced_by: stage_1_centreline
    consumed_by: [stage_1_centreline]
  ellipse_centres:
    description: "Fitted per-slice ellipse centres (3D)."
    produced_by: stage_1_centreline
    consumed_by: [stage_1_centreline]
  centre_curve:
    description: "RANSAC polynomial 3D curve through ellipse centres; enables arc-length unrolling."
    produced_by: stage_1_centreline
    consumed_by: [stage_2_denoise]
  cylindrical_point_cloud:
    description: "Point cloud in (h, theta, r); df_point_cloud with theta = angle * pi*diameter/360."
    space: cylindrical
    produced_by: stage_1_centreline
    consumed_by: [stage_2_denoise]
  denoised_cloud:
    description: "df_support_filtered: lining candidates (pred=9) after r-range + density filtering."
    produced_by: stage_2_denoise
    consumed_by: [stage_3_upsample]
  enhanced_segment_cloud:
    description: "df_enhance_segment: surface up-sampled lining points."
    produced_by: stage_3_upsample
    consumed_by: [stage_3_upsample]
  enhanced_joint_cloud:
    description: "df_enhance_joint: enhanced joint/outlier (boundary) points."
    produced_by: stage_3_upsample
    consumed_by: [stage_3_upsample, stage_4_detection]
  depth_map:
    description: "Unrolled 2D depth image (depth_map.png) at given resolution."
    space: image
    produced_by: stage_3_upsample
    consumed_by: [stage_4_detection, stage_5_segmentation]
  pixel_to_point:
    description: "Mapping from depth-map pixels back to point-cloud indices."
    produced_by: stage_3_upsample
    consumed_by: [stage_5_segmentation]
  outlier_depth_map:
    description: "Depth map containing only joint/outlier points (window_size=1, outlier_mode=True)."
    space: image
    produced_by: stage_4_detection
    consumed_by: [stage_4_detection]
  prompt_centres:
    description: "initial_points.csv (df_loc): X,Y prompt-centre pixel coords, one per ring joint locus."
    space: image
    produced_by: stage_4_detection
    consumed_by: [stage_5_segmentation]
  instance_masks:
    description: "results.pkl: per-block SAM masks, scores, logits, crop offsets."
    produced_by: stage_5_segmentation
    consumed_by: [stage_5_segmentation]
  label_ring_maps:
    description: "logits_map / label_map / ring_map merged over the depth map."
    space: image
    produced_by: stage_5_segmentation
    consumed_by: [stage_5_segmentation]
  segmented_point_cloud:
    description: "updated_df with pred (block label) and pred_ring (instance id). Final output."
    produced_by: stage_5_segmentation
    consumed_by: [external_deformation_analysis]

# ---------------------------------------------------------------------
# STAGES
# ---------------------------------------------------------------------
stages:

  # ============================= STAGE 1 =============================
  - id: stage_1_centreline
    algorithm: "Algorithm 1"
    name: Tunnel centre line extraction
    purpose: >
      Recover the tunnel axis, slice the cloud into rings, fit per-slice
      ellipse centres, fit a smooth 3D centre curve, and unroll the cloud
      into cylindrical coordinates (h, theta, r).
    inputs: [raw_point_cloud]
    outputs: [direction_vector, slice_cloud, ellipse_centres, centre_curve, cylindrical_point_cloud]
    substeps:
      - id: s1_1
        name: Determine direction vector
        detail: "Min bounding rectangle of XOY projection -> axis endpoints center1/center2."
      - id: s1_2
        name: Generate point cloud slices
        detail: "Cut planes along the axis at spacing delta; number of planes -> ring_count."
      - id: s1_3
        name: Ellipse centre fitting of slices
        detail: >
          cv2.fitEllipse + RANSAC per slice on projected 2D points. Slice
          points are pre-filtered by tunnel type (see filtered_point2ds):
          T1/T2/T3 remove the railway/floor region; T4/T5 are in-built with
          NO railway but a service tube on top that must be removed.
      - id: s1_4
        name: 3D curve fitting of centres
        detail: "RANSAC polynomial (degree 2) through ellipse centres; arc-length param -> h, theta, r."
    parameters:
      - id: p_slice_delta
        name: delta (slice spacing)
        type: float
        unit: m
        tunnel_dependent: false
        role: "Controls ring_count and slice thickness."
      - id: p_optimal_n
        name: optimal_n / ring_count
        type: int
        tunnel_dependent: true
        prior_ref: ring_count
        role: "Expected number of ring slices; anchors many downstream indices."
      - id: p_diameter
        name: diameter
        type: float
        unit: m
        tunnel_dependent: true
        prior_ref: diameter
        role: "Sets theta scaling (theta = angle * pi*diameter/360) and expected r."
      - id: p_poly_degree
        name: centre curve polynomial degree
        type: int
        default: 2
        tunnel_dependent: false
      - id: p_slice_filter_mode
        name: slice point filter mode
        type: enum
        values: [remove_railway, remove_top_tube, none]
        tunnel_dependent: true
        prior_ref: slice_filter_mode
        role: "T1/T2/T3 -> remove_railway; T4/T5 -> remove_top_tube."
    quality_metrics:
      - id: m_ellipse_residual
        name: mean ellipse fit residual
        healthy: "small and stable across slices"
      - id: m_centre_smoothness
        name: centre curve smoothness (RANSAC inlier ratio / residual)
        healthy: "high inlier ratio, low residual"
      - id: m_ring_count_sanity
        name: ring_count plausibility vs tunnel length
        healthy: "matches expected rings for the scanned span"
      - id: m_radius_consistency
        name: fitted radius vs prior diameter/2
        healthy: "close to prior diameter/2"
    failure_modes:
      - id: f_wrong_axis
        name: Wrong / flipped direction vector
        symptom: "center1/center2 swapped or axis misaligned; slices skewed."
      - id: f_ellipse_contamination
        name: Ellipse fit contaminated by rails/tube
        symptom: "eccentric or offset centres; wrong slice_filter_mode for the tunnel."
      - id: f_curve_overfit
        name: Centre curve over/under-fit
        symptom: "wavy centre line or large residual; unrolling distorted."
    consumes_priors: [diameter, ring_count, slice_filter_mode, radius_range]

  # ============================= STAGE 2 =============================
  - id: stage_2_denoise
    algorithm: "Algorithm 2"
    name: Local point-cloud density-difference-based denoising
    purpose: >
      Remove background (rails, tube, noise, out-of-range radius) so only
      lining candidates (pred=9) survive, using a radial gate plus a
      grid density/gradient test.
    inputs: [cylindrical_point_cloud, centre_curve]
    outputs: [denoised_cloud]
    substeps:
      - id: s2_1
        name: Radial gate
        detail: "mask_r = (r < r_inner) | (r > r_outer) -> pred=0 (tunnel-specific radius band)."
      - id: s2_2
        name: Density/gradient filtering
        detail: "Grid bins (x_step from ring_count, y_step=0.1, z_step=0.001); grad_threshold=0.2."
    parameters:
      - id: p_r_inner
        name: r_inner (radial gate lower)
        type: float
        unit: m
        tunnel_dependent: true
        prior_ref: radius_range.inner
      - id: p_r_outer
        name: r_outer (radial gate upper)
        type: float
        unit: m
        tunnel_dependent: true
        prior_ref: radius_range.outer
      - id: p_theta_gate
        name: theta gate (optional)
        type: interval
        tunnel_dependent: true
        prior_ref: theta_range
        role: "Only some tunnels (e.g. T3) additionally gate theta."
      - id: p_x_step
        name: x_step
        type: float
        derivation: "(max_x - min_x) / ring_count"
        tunnel_dependent: true
      - id: p_y_step
        name: y_step
        type: float
        default: 0.1
        tunnel_dependent: false
      - id: p_z_step
        name: z_step
        type: float
        default: 0.001
        tunnel_dependent: false
      - id: p_grad_threshold
        name: grad_threshold
        type: float
        default: 0.2
        tunnel_dependent: false
    quality_metrics:
      - id: m_retained_ratio
        name: retained lining ratio (pred==9 fraction)
        healthy: "lining kept, background removed; not too low, not too high"
      - id: m_bg_leakage
        name: background leakage (rails/tube still present)
        healthy: "near zero"
    failure_modes:
      - id: f_over_gate
        name: Radial gate too tight
        symptom: "lining points wrongly set to pred=0; holes in later depth map."
      - id: f_under_gate
        name: Radial gate too loose
        symptom: "rails/tube/noise retained; spurious structure downstream."
    consumes_priors: [radius_range, theta_range, ring_count]

  # ============================= STAGE 3 =============================
  - id: stage_3_upsample
    algorithm: "Algorithm 3"
    name: Geometry-guided up-sampling and projection
    purpose: >
      Densify uneven point cloud (surface + joint boundaries) then unroll
      into a 2D depth map with a pixel->point index map.
    inputs: [denoised_cloud]
    outputs: [enhanced_segment_cloud, enhanced_joint_cloud, depth_map, pixel_to_point]
    substeps:
      - id: s3_1
        name: Enhance segment surface
        detail: >
          Curvature via KDTree (num_neighbors=20); enhance_segment_surface with a
          3-step target_distance schedule (halving); curvature_threshold=0.0005.
      - id: s3_2
        name: Enhance outlier (joint) points
        detail: >
          enhance_outlier_points: depth_threshold_low/high, inter_radius=0.06,
          num_interpolations=2, duplicate_threshold=0.02, n_segment=[lo,hi].
          n_segment marks the high-density region around the scanner and MUST be
          adjusted for coverage (half vs full station).
      - id: s3_3
        name: Projection and record mapping index
        detail: >
          project_to_depth_map_inter(resolution=0.005, window_size=9) -> depth_map +
          pixel_to_point; save_depth_map_exact -> depth_map.png (vmin/vmax set from radius band).
    parameters:
      - id: p_target_distance_schedule
        name: target_distance schedule
        type: list[float]
        tunnel_dependent: true
        prior_ref: upsample_target_distance
        role: "3-step densification; larger tunnels use larger spacings."
      - id: p_curvature_threshold
        name: curvature_threshold
        type: float
        default: 0.0005
        tunnel_dependent: false
      - id: p_num_neighbors
        name: num_neighbors (curvature KDTree k)
        type: int
        default: 20
        tunnel_dependent: false
      - id: p_depth_threshold_low
        name: depth_threshold_low
        type: float
        tunnel_dependent: true
        prior_ref: outlier_depth_threshold.low
      - id: p_depth_threshold_high
        name: depth_threshold_high
        type: float
        tunnel_dependent: true
        prior_ref: outlier_depth_threshold.high
      - id: p_inter_radius
        name: inter_radius
        type: float
        default: 0.06
        tunnel_dependent: false
      - id: p_num_interpolations
        name: num_interpolations
        type: int
        default: 2
        tunnel_dependent: false
      - id: p_duplicate_threshold
        name: duplicate_threshold
        type: float
        default: 0.02
        tunnel_dependent: false
      - id: p_n_segment
        name: n_segment (high-density region [lo, hi])
        type: list[int]
        tunnel_dependent: true
        prior_ref: n_segment_hint
        role: "CRITICAL and coverage-dependent; controls where high-density enhancement applies."
      - id: p_resolution
        name: resolution (m/pixel)
        type: float
        default: 0.005
        tunnel_dependent: false
        role: "Shared with stages 4/5; changing it rescales all pixel-domain priors."
      - id: p_window_size
        name: projection window_size
        type: int
        default: 9
        tunnel_dependent: false
    quality_metrics:
      - id: m_hole_ratio
        name: depth map hole ratio (NaN pixels within lining)
        healthy: "low; no large voids"
      - id: m_density_uniformity
        name: point density uniformity across h
        healthy: "even; no banding at ring edges"
      - id: m_joint_contrast
        name: joint boundary contrast in outlier map
        healthy: "joints clearly visible as lines"
    failure_modes:
      - id: f_n_segment_misplaced
        name: n_segment high-density region misplaced
        symptom: "banding: over-dense near wrong rings, sparse elsewhere; detection distance pattern fails."
      - id: f_depth_holes
        name: Depth map holes
        symptom: "NaN voids -> SAM crops miss lining."
      - id: f_joint_oversmoothed
        name: Joints over-smoothed / under-enhanced
        symptom: "faint or missing joint lines -> detection misses prompt centres."
    consumes_priors: [upsample_target_distance, outlier_depth_threshold, n_segment_hint]

  # ============================= STAGE 4 =============================
  - id: stage_4_detection
    algorithm: "Algorithm 4"
    name: Joint / segment prompt-centre detection
    purpose: >
      Detect segment joints on the unrolled map and derive one prompt
      centre per ring locus,       output as initial_points.csv. This is the
      DETECTION algorithm (Algorithm 4).
    inputs: [enhanced_joint_cloud, depth_map]
    outputs: [outlier_depth_map, prompt_centres]
    substeps:
      - id: s4_1
        name: Build outlier-only map
        detail: "project_to_depth_map_inter(window_size=1, outlier_mode=True)."
      - id: s4_2
        name: Binarise and dilate
        detail: "threshold=127; dilate kernel 3x3, iterations=1."
      - id: s4_3
        name: Hough line detection
        detail: >
          Oblique HoughLinesP + horizontal HoughLinesP + vertical HoughLines.
          Thresholds/minLineLength/maxLineGap and the vertical accumulator
          threshold are tunnel-specific.
      - id: s4_4
        name: Angle filtering
        detail: "Keep oblique lines in [5,10] deg (positive) and [-10,-5] deg (negative); horizontal as fallback only."
      - id: s4_5
        name: Intersection + distance-pattern matching
        detail: >
          line_segment_vertical_intersection; merge_close_points(threshold=6);
          check_distance_pattern using K_height_pixel, AB_height_pixel priors and a tolerance.
    parameters:
      - id: p_bin_threshold
        name: binary threshold
        type: int
        default: 127
        tunnel_dependent: false
      - id: p_dilate_kernel
        name: dilation kernel size
        type: int
        default: 3
        tunnel_dependent: false
      - id: p_dilate_iter
        name: dilation iterations
        type: int
        default: 1
        tunnel_dependent: false
      - id: p_hough_oblique
        name: oblique HoughLinesP (threshold, minLineLength, maxLineGap)
        type: tuple
        tunnel_dependent: true
        prior_ref: hough.oblique
      - id: p_hough_horizontal
        name: horizontal HoughLinesP (threshold, minLineLength, maxLineGap)
        type: tuple
        tunnel_dependent: true
        prior_ref: hough.horizontal
      - id: p_hough_vertical
        name: vertical HoughLines accumulator threshold
        type: int
        tunnel_dependent: true
        prior_ref: hough.vertical_threshold
      - id: p_angle_positive
        name: positive oblique angle range
        type: interval
        default: [5, 10]
        tunnel_dependent: false
      - id: p_angle_negative
        name: negative oblique angle range
        type: interval
        default: [-10, -5]
        tunnel_dependent: false
      - id: p_merge_threshold
        name: merge_close_points threshold (px)
        type: int
        default: 6
        tunnel_dependent: false
      - id: p_pattern_tolerance
        name: check_distance_pattern tolerance (px)
        type: int
        tunnel_dependent: true
        prior_ref: detection.pattern_tolerance
      - id: p_K_height_pixel
        name: K_height_pixel (distance-pattern prior)
        type: float
        derivation: "K_height / (1000*resolution)"
        tunnel_dependent: true
        prior_ref: block_height.K
      - id: p_AB_height_pixel
        name: AB_height_pixel (distance-pattern prior)
        type: float
        derivation: "AB_height / (1000*resolution)"
        tunnel_dependent: true
        prior_ref: block_height.AB
    quality_metrics:
      - id: m_prompt_count
        name: detected prompt-centre count vs expected rings
        healthy: "one coherent set of centres per ring; matches ring_count coverage"
      - id: m_spacing_regularity
        name: inter-centre spacing regularity
        healthy: "matches K/AB height pattern within tolerance"
      - id: m_line_yield
        name: oblique line yield
        healthy: "enough oblique lines that horizontal fallback is not needed"
    failure_modes:
      - id: f_missing_lines
        name: Too few oblique lines detected
        symptom: "falls back to horizontal; unstable prompt centres."
        likely_upstream: [f_joint_oversmoothed, f_depth_holes]
      - id: f_spurious_lines
        name: Spurious lines detected
        symptom: "extra intersections; false prompt centres."
        likely_upstream: [f_under_gate]
      - id: f_wrong_vertical_band
        name: Wrong vertical band selected
        symptom: "vertical-line window excludes/includes wrong rings."
      - id: f_pattern_mismatch
        name: Distance-pattern match fails
        symptom: "centres not spaced by K/AB pattern; wrong height priors or n_segment misplacement."
        likely_upstream: [f_n_segment_misplaced]
    consumes_priors: [hough, block_height, detection.pattern_tolerance]

  # ============================= STAGE 5 =============================
  - id: stage_5_segmentation
    algorithm: "Algorithm 5"
    name: SAM template-prompt segmentation and reprojection
    purpose: >
      From each prompt centre, build a per-block template mask + prompt
      points, run SAM (vit_h), merge masks into label/ring maps, and
      project labels back to the 3D point cloud. This is the
      SEGMENTATION algorithm (Algorithm 5).
    inputs: [prompt_centres, depth_map, pixel_to_point]
    outputs: [instance_masks, label_ring_maps, segmented_point_cloud]
    substeps:
      - id: s5_1
        name: Template prompt + SAM mask
        detail: >
          generate_template_mask (per block K/B1/B2/A*), generate_prompt_points,
          crop_image_and_mask_logits, compute_logits_from_mask (->256x256),
          process_row iterates blocks per ring using segment_per_ring,
          segment_width, K_height, AB_height, angle (tunnel-specific). Model vit_h.
      - id: s5_2
        name: Merge masks
        detail: "logits_map / label_map / ring_map; block_to_label mapping (block count is tunnel-specific)."
      - id: s5_3
        name: Project back to point cloud
        detail: "project_back_to_point_cloud: update pred where pred==9; set pred_ring; pred_ring==-1 -> pred=0."
    parameters:
      - id: p_sam_model_type
        name: SAM model_type
        type: enum
        values: [vit_h, vit_l, vit_b]
        default: vit_h
        tunnel_dependent: false
      - id: p_segment_per_ring
        name: segment_per_ring
        type: int
        tunnel_dependent: true
        prior_ref: segment_per_ring
        role: "Number of segments per ring; drives block iteration and block_to_label."
      - id: p_segment_width
        name: segment_width (mm)
        type: float
        tunnel_dependent: true
        prior_ref: segment_width
      - id: p_block_K_height
        name: K_height (mm)
        type: float
        tunnel_dependent: true
        prior_ref: block_height.K
      - id: p_block_AB_height
        name: AB_height (mm)
        type: float
        tunnel_dependent: true
        prior_ref: block_height.AB
      - id: p_taper_angle
        name: angle (segment taper, deg)
        type: float
        tunnel_dependent: true
        prior_ref: taper_angle
      - id: p_block_to_label
        name: block_to_label mapping
        type: map
        tunnel_dependent: true
        prior_ref: block_to_label
        role: "K,B1,A1..A(n),B2 -> integer labels; number of A blocks = segment_per_ring-3."
      - id: p_template_vertices
        name: block template polygon vertices
        type: geometry
        tunnel_dependent: true
        role: "Coarse mask shape per block (K, B1, B2, A); tied to block heights/widths."
    quality_metrics:
      - id: m_sam_score
        name: mean SAM mask score per instance
        healthy: "high and stable"
      - id: m_coverage
        name: lining coverage (non-background fraction of expected lining)
        healthy: "high; few uncovered (label 0) lining pixels"
      - id: m_ring_match
        name: recovered ring count vs expected
        healthy: "matches ring_count"
      - id: m_label_consistency
        name: block-label consistency around each ring
        healthy: "expected K/B/A sequence present once per ring"
      - id: m_iou_gt
        name: IoU vs ground truth (when available)
        healthy: "high vs Seg2Tunnel-style labels"
    failure_modes:
      - id: f_crop_offset
        name: Prompt-centre / crop offset
        symptom: "masks shifted; wrong block covered."
        likely_upstream: [f_pattern_mismatch, f_wrong_vertical_band]
      - id: f_template_mismatch
        name: Template mask mismatch
        symptom: "wrong block type/height template -> poor SAM mask; low score."
      - id: f_boundary_rings_missing
        name: Missing rings at map boundaries
        symptom: "reverse/stop logic drops edge rings; coverage low at ends."
      - id: f_over_under_coverage
        name: Over/under coverage
        symptom: "background bleed into lining, or lining left as label 0."
        likely_upstream: [f_depth_holes]
    consumes_priors: [segment_per_ring, segment_width, block_height, taper_angle, block_to_label]

# ---------------------------------------------------------------------
# INTER-STAGE DEPENDENCIES (causal chains an agent must respect before
# blaming its own stage). "effect" happens in a later stage; "cause"
# lives in an earlier stage.
# ---------------------------------------------------------------------
inter_stage_dependencies:
  - cause: stage_1_centreline.f_wrong_axis
    effect: stage_3_upsample.f_density_uniformity_loss
    note: "A skewed axis distorts arc-length h, banding the unrolled depth map."
  - cause: stage_1_centreline.f_ellipse_contamination
    effect: stage_2_denoise.f_under_gate
    note: "Wrong slice_filter_mode (railway vs top tube) leaks structure into the radial band."
  - cause: stage_2_denoise.f_over_gate
    effect: stage_3_upsample.f_depth_holes
    note: "Too-tight radial gate deletes lining -> depth-map voids."
  - cause: stage_3_upsample.f_n_segment_misplaced
    effect: stage_4_detection.f_pattern_mismatch
    note: "Misplaced high-density region breaks the K/AB distance pattern."
  - cause: stage_3_upsample.f_joint_oversmoothed
    effect: stage_4_detection.f_missing_lines
    note: "Faint joints -> too few oblique lines -> unstable prompt centres."
  - cause: stage_4_detection.f_pattern_mismatch
    effect: stage_5_segmentation.f_crop_offset
    note: "Bad prompt centres -> crops and templates land off-segment."
  - cause: stage_4_detection.f_wrong_vertical_band
    effect: stage_5_segmentation.f_boundary_rings_missing
    note: "Wrong vertical window -> edge rings never receive prompts."

# ---------------------------------------------------------------------
# DIAGNOSTIC RULES: metric condition -> failure_mode. Agents evaluate
# these against the current State. Conditions are expressed symbolically
# (thresholds are tunnel/data dependent and should be calibrated).
# ---------------------------------------------------------------------
diagnostic_rules:
  - id: d1
    stage: stage_1_centreline
    when: "m_radius_consistency deviates far from prior diameter/2 OR m_ellipse_residual high"
    implies: f_ellipse_contamination
    check_prior: "Confirm slice_filter_mode matches tunnel (T4/T5 remove_top_tube)."
  - id: d2
    stage: stage_2_denoise
    when: "m_bg_leakage high"
    implies: f_under_gate
  - id: d3
    stage: stage_2_denoise
    when: "m_retained_ratio very low AND m_hole_ratio high downstream"
    implies: f_over_gate
  - id: d4
    stage: stage_3_upsample
    when: "m_density_uniformity shows banding around specific rings"
    implies: f_n_segment_misplaced
  - id: d5
    stage: stage_3_upsample
    when: "m_hole_ratio high"
    implies: f_depth_holes
  - id: d6
    stage: stage_3_upsample
    when: "m_joint_contrast low"
    implies: f_joint_oversmoothed
  - id: d7
    stage: stage_4_detection
    when: "m_line_yield low AND horizontal fallback triggered"
    implies: f_missing_lines
  - id: d8
    stage: stage_4_detection
    when: "m_spacing_regularity poor vs K/AB pattern"
    implies: f_pattern_mismatch
  - id: d9
    stage: stage_4_detection
    when: "m_prompt_count much larger than expected"
    implies: f_spurious_lines
  - id: d10
    stage: stage_5_segmentation
    when: "m_sam_score low AND m_label_consistency broken"
    implies: f_template_mismatch
  - id: d11
    stage: stage_5_segmentation
    when: "m_coverage low at map ends AND m_ring_match < expected"
    implies: f_boundary_rings_missing
  - id: d12
    stage: stage_5_segmentation
    when: "m_coverage low uniformly OR background bleed high"
    implies: f_over_under_coverage

# ---------------------------------------------------------------------
# REMEDIATION ACTIONS: parameter changes an agent may propose. Each
# lists the target failure_mode, the parameter, direction, expected
# effect, and cross-stage precondition to check first.
# ---------------------------------------------------------------------
remediation_actions:
  - id: r_slice_filter
    for: f_ellipse_contamination
    action: "Set p_slice_filter_mode per tunnel (T1/T2/T3 remove_railway, T4/T5 remove_top_tube)."
    expected: "Ellipse centres recentre; residual drops."
  - id: r_radial_gate_widen
    for: f_over_gate
    action: "Widen [p_r_inner, p_r_outer] toward prior radius_range."
    expected: "Lining points retained; depth-map holes shrink."
    precondition: "Confirm prior radius_range for the tunnel."
  - id: r_radial_gate_tighten
    for: f_under_gate
    action: "Tighten [p_r_inner, p_r_outer]; add p_theta_gate if tunnel provides one (e.g. T3)."
    expected: "Rails/tube removed."
  - id: r_fix_n_segment
    for: f_n_segment_misplaced
    action: "Recompute p_n_segment [lo,hi] for the actual scan coverage (half vs full station)."
    expected: "High-density region aligns with real rings; banding removed."
    precondition: "Know ring_count and scanner ring position."
  - id: r_lower_depth_threshold
    for: f_joint_oversmoothed
    action: "Lower p_depth_threshold_low/high so more joint points qualify."
    expected: "Joint lines sharpen; detection line yield rises."
  - id: r_increase_window_or_upsample
    for: f_depth_holes
    action: "Increase p_window_size and/or add a finer p_target_distance step."
    expected: "Voids interpolated; coverage improves."
  - id: r_relax_hough
    for: f_missing_lines
    action: "Lower p_hough_oblique threshold/minLineLength or raise maxLineGap toward tunnel prior."
    expected: "More oblique lines; horizontal fallback avoided."
    precondition: "First rule out upstream f_joint_oversmoothed / f_depth_holes."
  - id: r_tighten_hough
    for: f_spurious_lines
    action: "Raise p_hough_oblique threshold/minLineLength; check upstream f_under_gate."
    expected: "Fewer false lines and intersections."
  - id: r_fix_vertical_band
    for: f_wrong_vertical_band
    action: "Adjust p_hough_vertical window bounds (multiples of segment width) for the tunnel."
    expected: "Correct rings enter the vertical band."
  - id: r_fix_height_priors
    for: f_pattern_mismatch
    action: "Set p_K_height_pixel / p_AB_height_pixel from tunnel block_height and p_pattern_tolerance."
    expected: "Distance-pattern matches; prompt spacing regular."
    precondition: "Ensure resolution unchanged; pixel priors derive from it."
  - id: r_fix_template
    for: f_template_mismatch
    action: "Set p_segment_per_ring, p_block_to_label, block heights/widths, p_taper_angle to tunnel priors; verify p_template_vertices."
    expected: "Template matches segment geometry; SAM score rises."
  - id: r_extend_boundary_logic
    for: f_boundary_rings_missing
    action: "Verify reverse/stop iteration and prompt coverage at map ends; re-check p_hough_vertical band."
    expected: "Edge rings receive prompts and get labelled."
  - id: r_balance_coverage
    for: f_over_under_coverage
    action: "Re-check upstream depth holes; adjust template/prompt density; verify pred==9 -> pred update path."
    expected: "Coverage rises without background bleed."

# ---------------------------------------------------------------------
# AGENT INTERFACE: contract for staged LLM agents. Each stage agent
# receives a State and emits a Diagnosis + proposed Actions.
# ---------------------------------------------------------------------
agent_interface:
  state:
    stage_id: "which stage this state belongs to"
    tunnel_id: "T1..T5 -> selects the prior profile in tunnel_priors.yaml"
    inputs_present: "list of artifact ids available"
    outputs_present: "list of artifact ids produced"
    parameter_values: "map of parameter id -> current value"
    metric_values: "map of quality metric id -> measured value/summary"
    artifacts_summary: "compact description or thumbnails of key artifacts (e.g. depth map)"
  diagnosis:
    matched_rules: "list of diagnostic_rule ids that fired"
    failure_modes: "list of failure_mode ids"
    upstream_suspects: "failure_mode ids in earlier stages via inter_stage_dependencies"
  proposal:
    actions: "ordered list of remediation_action ids with concrete parameter deltas"
    preconditions_checked: "which cross-stage preconditions were verified"
    confidence: "low/medium/high with rationale"
  orchestration_hint: >
    Run agents in pipeline order (1 -> 2 -> 3 -> 4 -> 5). Before a stage
    agent proposes changes to its own parameters, it must consult
    inter_stage_dependencies and, if an upstream failure_mode is a likely
    cause, defer to the upstream stage agent first.
